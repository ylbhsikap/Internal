<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Responsif</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        /* LOGO: Fleksibel mengikuti layar */
        .logo-container img {
            width: 100%;
            max-width: 180px; /* Ukuran maksimal di laptop */
            height: auto;
        }

        /* WADAH UTAMA: Membatasi lebar di laptop agar tidak terlalu melar */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }

        /* KALENDER: Trik CSS agar responsif di HP & Laptop */
        .kalendar-box {
            position: relative;
            padding-bottom: 75%; /* Rasio standar di laptop */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .kalendar-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* ELEMEN KHUSUS HP (Screen width di bawah 600px) */
        @media screen and (max-width: 600px) {
            body {
                padding: 10px; /* Jarak pinggir lebih tipis di HP */
            }
            .logo-container img {
                max-width: 130px; /* Logo sedikit mengecil di HP */
            }
            .kalendar-box {
                padding-bottom: 120%; /* Membuat kalender lebih memanjang ke bawah di HP agar teksnya tidak terpotong */
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="Logo">
        </div>

        <h2>JADWAL SIDANG LBH SIKAP YOGYAKARTA</h2>
        
        <div class="kalendar-box">
            <!-- Isi src dengan link embed Google Calendar Anda -->
            <iframe src="https://calendar.google.com/calendar/embed?src=a7b55cfe9a4a24b5a14fcc874559ac49bf8a5e8341a7831243124e5fb89036ba%40group.calendar.google.com&ctz=Asia%2FJakarta" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

</body>
</html>
