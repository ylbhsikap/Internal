<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Sidang LBH SIKAP YOGYAKARTA</title>
	<link rel="icon" type="image/png" href="favicon.png">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        /* LOGO: Fleksibel mengikuti layar */
        .logo-container img {
            width: 100%;
            max-width: 180px; /* Ukuran maksimal di laptop */
            height: auto;
        }

        /* WADAH UTAMA: Membatasi lebar di laptop agar tidak terlalu melar */
        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
       
        /* KALENDER: Trik CSS agar responsif di HP & Laptop */
       .kalendar-box {
    position: relative;
    padding-bottom: 70%; /* Rasio proporsional, tidak terlalu tinggi */
    height: 0;
    overflow: hidden;
    
    /* Sentuhan Elegan Modern */
    background-color: #ffffff;
    border-radius: 16px; /* Sudut melengkung yang halus dan modern */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); /* Bayangan super lembut, anti-kaku */
    border: 1px solid rgba(0, 0, 0, 0.03); /* Garis tepi tipis transparan */
    
    transition: all 0.3s ease; /* Efek halus saat transisi */
}
        .kalendar-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* ELEMEN KHUSUS HP (Screen width di bawah 600px) */
        @media screen and (max-width: 600px) {
            body {
                padding: 10px; /* Jarak pinggir lebih tipis di HP */
            }
            .logo-container img {
                max-width: 130px; /* Logo sedikit mengecil di HP */
            }
            .kalendar-box {
                padding-bottom: 120%; /* Membuat kalender lebih memanjang ke bawah di HP agar teksnya tidak terpotong */
            }
        }
        /* DESKTOP FULL WIDTH FIX */
        @media screen and (min-width: 1024px) {
            .wrapper {
                max-width: none;
                width: 100%;
                padding: 0 60px;
                box-sizing: border-box;
            }

            .kalendar-box {
                padding-bottom: 0;   /* matikan rasio */
                height: 600px;       /* tinggi tetap */
            }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="logo-container">
            <img src="logo.png" alt="Logo">
        </div>

        <h2>JADWAL SIDANG LBH SIKAP YOGYAKARTA</h2>
        
        <div class="kalendar-box">
            <!-- Isi src dengan link embed Google Calendar Anda -->
            <iframe src="https://calendar.google.com/calendar/embed?src=faishalammard%40gmail.com&ctz=Asia%2FJakarta&hl=id" style="border: 0" width="800" height="600" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

</body>
</html>
